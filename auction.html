<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos - Live Auction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white h-[100dvh] w-full overflow-hidden flex flex-col font-inter">

    <!-- Notification Toast Container -->
    <div id="notificationArea" class="fixed top-20 left-0 w-full z-50 pointer-events-none flex flex-col items-center gap-2 px-4"></div>

    <!-- Top Navigation Bar -->
    <header class="h-14 sm:h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-3 sm:px-4 shadow-lg z-20 shrink-0">
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="relative">
                <span class="absolute -top-1 -right-1 flex h-2.5 w-2.5 sm:h-3 sm:w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-full w-full bg-green-500"></span>
                </span>
                <img src="https://ui-avatars.com/api/?name=MA&background=0D8ABC&color=fff&size=36&bold=true" class="w-8 h-8 sm:w-9 sm:h-9 rounded-full ring-2 ring-gray-700">
            </div>
            <div>
                <h1 class="font-bold text-xs sm:text-sm tracking-wide leading-tight">MEJORES AMIGOS</h1>
                <p class="text-[10px] text-gray-400">LIVE AUCTION</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="hidden xs:flex items-center gap-2 px-3 py-1 bg-gray-900 rounded-full border border-gray-700">
                <span class="text-[10px] text-gray-400">PLAYER</span>
                <span class="text-xs font-mono font-bold" id="progressDisplay">--/191</span>
            </div>
            <button onclick="document.getElementById('rosterModal').classList.remove('hidden')" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs font-bold border border-gray-600 transition-colors flex items-center gap-1.5">
                <span>📋</span> <span class="hidden sm:inline">MY SQUAD</span>
            </button>
        </div>
    </header>

    <!-- Main Content: The Arena (Uses flex-1 and min-h-0 to scroll internally if needed, preserving footer) -->
    <main class="flex-1 relative flex flex-col items-center p-2 min-h-0">
        
        <!-- Player Card Container - Constrained max height for mobile -->
        <div class="w-full max-w-md relative z-10 flex flex-col h-full justify-between sm:justify-center">
            
            <!-- GOAT Effect -->
            <div id="goatBadge" class="hidden absolute top-0 left-1/2 transform -translate-x-1/2 w-full flex justify-center z-20 pointer-events-none -mt-3">
                <div class="bg-yellow-500 text-black font-black text-[10px] sm:text-xs px-3 py-1 rounded-full shadow-[0_0_20px_rgba(234,179,8,0.6)] animate-bounce tracking-widest border-2 border-yellow-200">
                    LEGENDARY PLAYER
                </div>
            </div>

            <!-- The Card (Scrollable if content overflows on tiny screens) -->
            <div class="bg-gray-800 rounded-2xl sm:rounded-[2rem] shadow-2xl border border-gray-700 flex flex-col relative w-full flex-1 overflow-hidden">
                
                <!-- Card Header / Image (Flexible height) -->
                <div class="relative pt-4 pb-2 flex justify-center bg-gradient-to-b from-gray-700/50 to-gray-800 shrink-0">
                    <div class="absolute top-3 right-3 z-10">
                        <span id="playerPosition" class="bg-gray-900/90 backdrop-blur text-white text-[10px] sm:text-xs font-black px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg border border-gray-600 shadow-lg tracking-wider">
                            FWD
                        </span>
                    </div>

                    <!-- Responsive Image Size -->
                    <div class="w-28 h-28 xs:w-36 xs:h-36 sm:w-48 sm:h-48 rounded-full p-1 bg-gradient-to-tr from-blue-500 via-purple-500 to-pink-500 shadow-xl relative group shrink-0">
                        <img id="playerImage" src="" alt="Player" class="w-full h-full rounded-full object-cover border-4 border-gray-900 bg-gray-700">
                        <div id="soldStamp" class="hidden absolute inset-0 flex items-center justify-center bg-black/40 rounded-full backdrop-blur-[2px]">
                            <span class="text-red-500 font-black text-2xl sm:text-4xl border-4 border-red-500 px-2 py-1 transform -rotate-12 tracking-tighter opacity-90">SOLD</span>
                        </div>
                    </div>
                </div>

                <!-- Card Body (Scrollable content) -->
                <div class="px-4 sm:px-6 pb-4 pt-1 text-center flex-1 flex flex-col justify-between min-h-0 overflow-y-auto">
                    
                    <!-- Name -->
                    <div class="shrink-0 mb-2">
                        <h2 id="playerName" class="text-xl sm:text-3xl font-black text-white leading-tight drop-shadow-md min-h-[1.5rem] line-clamp-2">
                            Loading...
                        </h2>
                    </div>
                    
                    <!-- Stats Grid -->
                    <div class="grid grid-cols-2 gap-2 sm:gap-3 shrink-0 mb-2">
                        <div class="bg-gray-900/60 rounded-xl p-2 sm:p-3 border border-gray-700/50 backdrop-blur flex flex-col justify-center">
                            <p class="text-[9px] sm:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-0.5">Current Price</p>
                            <p id="currentBidDisplay" class="text-lg sm:text-2xl font-bold text-green-400 tracking-tight">₹5.0 L</p>
                        </div>
                        <div class="bg-gray-900/60 rounded-xl p-2 sm:p-3 border border-gray-700/50 backdrop-blur flex flex-col justify-center">
                            <p class="text-[9px] sm:text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-0.5">Time Left</p>
                            <p id="timerDisplay" class="text-2xl sm:text-3xl font-black text-white font-mono leading-none">10</p>
                        </div>
                    </div>

                    <!-- Highest Bidder -->
                    <div class="bg-blue-600/10 rounded-lg py-1.5 px-3 border border-blue-500/20 flex items-center justify-between shrink-0 mb-3">
                        <span class="text-[9px] sm:text-[10px] text-blue-300 uppercase font-bold">Highest Bidder</span>
                        <div class="flex items-center gap-2">
                            <span id="highestBidderName" class="font-bold text-xs sm:text-sm text-white truncate max-w-[120px]">No Bids</span>
                            <span id="highestBidderCrown" class="hidden text-xs sm:text-sm">👑</span>
                        </div>
                    </div>

                    <!-- Bid Button - ALWAYS VISIBLE -->
                    <div class="space-y-1 shrink-0 mt-auto pt-2">
                        <button id="placeBidBtn" class="w-full py-3 sm:py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-xl font-black text-lg sm:text-xl shadow-[0_4px_0_rgb(30,58,138)] active:shadow-none active:translate-y-[4px] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none transition-all flex items-center justify-center gap-2 group">
                            <span>BID</span> 
                            <span id="nextBidAmount" class="bg-black/20 px-2 py-0.5 rounded text-base sm:text-lg font-mono">+ ₹5L</span>
                        </button>
                        <p id="bidErrorMsg" class="text-red-400 text-[9px] sm:text-[10px] font-bold h-3 transition-all opacity-0"></p>
                    </div>

                </div>
            </div>

            <!-- Admin Panel (Conditional) -->
            <div id="auctionAdminControls" class="hidden mt-2 p-2 bg-gray-800 rounded-xl border border-yellow-500/20 shadow-lg shrink-0">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">👑 Admin</span>
                    <button id="adminPauseBtn" class="px-2 py-0.5 bg-yellow-600/20 text-yellow-500 rounded text-[10px] font-bold border border-yellow-600/50">⏸ Pause</button>
                </div>
                <div class="grid grid-cols-2 gap-1">
                    <button id="adminDismissBtn" class="hidden col-span-2 py-1.5 bg-red-600 rounded-lg font-bold text-white text-[10px] animate-pulse">❌ DISMISS</button>
                    <button id="adminForceNextBtn" class="col-span-2 py-1.5 bg-gray-700 rounded-lg font-bold text-gray-300 text-[10px]">⏭ SKIP</button>
                </div>
            </div>

        </div>
    </main>

    <!-- Bottom Stats Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20 shrink-0">
        <div class="max-w-4xl mx-auto px-4 py-2 sm:py-3">
            <div class="flex justify-between items-end mb-2">
                <div class="flex flex-col">
                    <span class="text-[9px] sm:text-[10px] text-gray-500 font-bold uppercase">Budget Left</span>
                    <span id="myBudgetDisplay" class="text-xl sm:text-2xl font-black text-yellow-400 leading-none">₹15.00 Cr</span>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[9px] sm:text-[10px] text-gray-500 font-bold uppercase">Squad Size</span>
                    <span class="text-sm font-bold text-white"><span id="teamCountDisplay">0</span>/18</span>
                </div>
            </div>
            
            <!-- Position Pills -->
            <div class="grid grid-cols-4 gap-1.5 sm:gap-2">
                <div class="bg-gray-900 rounded-lg p-1 text-center border border-gray-700">
                    <div class="text-[8px] sm:text-[9px] text-gray-500 font-bold">GK (3)</div>
                    <div id="statGK" class="text-[10px] sm:text-xs font-bold text-white">0</div>
                </div>
                <div class="bg-gray-900 rounded-lg p-1 text-center border border-gray-700">
                    <div class="text-[8px] sm:text-[9px] text-gray-500 font-bold">DEF (5)</div>
                    <div id="statDEF" class="text-[10px] sm:text-xs font-bold text-white">0</div>
                </div>
                <div class="bg-gray-900 rounded-lg p-1 text-center border border-gray-700">
                    <div class="text-[8px] sm:text-[9px] text-gray-500 font-bold">MID (5)</div>
                    <div id="statMID" class="text-[10px] sm:text-xs font-bold text-white">0</div>
                </div>
                <div class="bg-gray-900 rounded-lg p-1 text-center border border-gray-700">
                    <div class="text-[8px] sm:text-[9px] text-gray-500 font-bold">FWD (5)</div>
                    <div id="statFWD" class="text-[10px] sm:text-xs font-bold text-white">0</div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Full Roster Modal -->
    <div id="rosterModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/80 backdrop-blur-sm animate-fade-in">
        <div class="bg-gray-800 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl h-[85vh] sm:h-[80vh] flex flex-col shadow-2xl animate-slide-up">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-2xl">
                <h2 class="text-lg font-bold">My Squad</h2>
                <button onclick="document.getElementById('rosterModal').classList.add('hidden')" class="p-2 bg-gray-700 rounded-full hover:bg-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar" id="rosterList"></div>
            <div class="p-4 border-t border-gray-700 bg-gray-900 rounded-b-0 sm:rounded-b-2xl pb-safe">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-400">Total Spent</span>
                    <span id="totalSpentDisplay" class="font-bold text-white">₹0.00 L</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module" src="app.js"></script>
</body>
</html>
